<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library — AniLoka</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/library.css">
</head>
<body>

<div id="page-loader"><div class="loader-ring"></div></div>

<header class="topnav">
  <a href="home.html" class="wordmark"><span class="ani">Ani</span><span class="loka">Loka</span></a>
  <nav class="topnav-links">
    <a href="home.html" data-nav="home">Home</a>
    <a href="search.html" data-nav="search">Search</a>
    <a href="library.html" data-nav="library">Library</a>
    <a href="premium.html" data-nav="premium">Premium</a>
    <a href="profile.html" data-nav="profile">Profile</a>
  </nav>
  <div class="topnav-actions">
    <button class="avatar-btn" onclick="location.href='profile.html'">U</button>
    <button class="hamburger" id="hamburger-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
    </button>
  </div>
</header>

<div class="mobile-nav">
  <button class="close-mobile">&times;</button>
  <a href="home.html">Home</a>
  <a href="search.html">Search</a>
  <a href="library.html">Library</a>
  <a href="premium.html">Premium</a>
  <a href="profile.html">Profile</a>
  <a href="#" id="mobile-logout">Log Out</a>
</div>

<main class="container">
  <h1 style="font-family:var(--display); font-size:34px; letter-spacing:.02em; padding-top:30px;">My Library</h1>

  <div class="library-tabs">
    <button class="active" data-tab="favorites">Favorites</button>
    <button data-tab="reading">Reading</button>
    <button data-tab="completed">Completed</button>
    <button data-tab="planToRead">Plan to Read</button>
    <button data-tab="history">History</button>
  </div>

  <div class="library-grid" id="library-grid"></div>
</main>

<nav class="tab-bar">
  <ul>
    <li><a href="home.html" data-nav="home"><span data-icon="home" data-size="20"></span><br>Home</a></li>
    <li><a href="search.html" data-nav="search"><span data-icon="search" data-size="20"></span><br>Search</a></li>
    <li><a href="library.html" data-nav="library"><span data-icon="library" data-size="20"></span><br>Library</a></li>
    <li><a href="premium.html" data-nav="premium"><span data-icon="premium" data-size="20"></span><br>Premium</a></li>
    <li><a href="profile.html" data-nav="profile"><span data-icon="profile" data-size="20"></span><br>Profile</a></li>
  </ul>
</nav>

<div id="toast-stack"></div>

<script src="js/data.js"></script>
<script src="js/icons.js"></script>
<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
  document.getElementById("hamburger-btn").addEventListener("click", () => document.querySelector(".mobile-nav").classList.add("open"));
  document.getElementById("mobile-logout").addEventListener("click", (e) => { e.preventDefault(); AUTH.logout(); });
</script>
<script src="js/library.js"></script>
</body>
</html>
