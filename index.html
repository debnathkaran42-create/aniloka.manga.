<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AniLoka — Read Manga in Gold Standard</title>
<meta name="description" content="AniLoka — a premium manga reading platform.">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/splash.css">
</head>
<body>

<div class="splash">
  <canvas id="particle-canvas"></canvas>
  <div class="splash-glow"></div>

  <div class="splash-content">
    <div class="splash-mark"><span class="ani">Ani</span><span class="loka">Loka</span></div>
    <div class="splash-rule"></div>
    <p class="splash-tagline">Welcome to AniLoka</p>

    <div class="splash-enter">
      <button id="enter-btn" class="btn btn-primary">Enter</button>
    </div>
    <p class="splash-hint">Tap enter to begin reading</p>
  </div>

  <div class="splash-footer">Manga, in gold standard</div>
</div>

<script src="js/data.js"></script>
<script src="js/splash.js"></script>
</body>
</html>
