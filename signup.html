<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up â€” AniLoka</title>
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/auth.css">
</head>
<body>

<a class="back-to-splash" href="index.html">&larr; Back</a>

<div class="auth-screen">
  <div class="auth-card">
    <div class="wordmark"><span class="ani">Ani</span><span class="loka">Loka</span></div>
    <h1>Create your account</h1>

    <div class="form-error" id="signup-error"></div>

    <form id="signup-form" novalidate>
      <div class="field" id="f-username">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="yourname" minlength="3" required>
        <div class="error-msg">Username must be at least 3 characters.</div>
      </div>

      <div class="field" id="f-email">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" required>
        <div class="error-msg">Enter a valid email address.</div>
      </div>

      <div class="field" id="f-password">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="At least 6 characters" required minlength="6">
          <button type="button" class="toggle-pass" data-target="password">SHOW</button>
        </div>
        <div class="strength-meter"><span></span><span></span><span></span><span></span></div>
        <div class="error-msg">Password must be at least 6 characters.</div>
      </div>

      <div class="field" id="f-confirm">
        <label for="confirm">Confirm Password</label>
        <div class="input-wrap">
          <input type="password" id="confirm" placeholder="Re-enter your password" required>
          <button type="button" class="toggle-pass" data-target="confirm">SHOW</button>
        </div>
        <div class="error-msg">Passwords do not match.</div>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="signup-submit">Create Account</button>
    </form>

    <div class="auth-switch">Already have an account? <a href="login.html">Log in</a></div>
  </div>
</div>

<div id="toast-stack"></div>

<script src="js/data.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
  function setFieldError(id, invalid) { document.getElementById(id).classList.toggle("invalid", invalid); }

  document.querySelectorAll(".toggle-pass").forEach(btn => {
    btn.addEventListener("click", () => {
      const input = document.getElementById(btn.dataset.target);
      const show = input.type === "password";
      input.type = show ? "text" : "password";
      btn.textContent = show ? "HIDE" : "SHOW";
    });
  });

  const pwInput = document.getElementById("password");
  const meterBars = document.querySelectorAll(".strength-meter span");
  pwInput.addEventListener("input", () => {
    const v = pwInput.value;
    let score = 0;
    if (v.length >= 6) score++;
    if (v.length >= 10) score++;
    if (/[A-Z]/.test(v) && /[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    meterBars.forEach((bar, i) => bar.classList.toggle("on", i < score));
  });

  document.getElementById("signup-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirm = document.getElementById("confirm").value;
    const errorBox = document.getElementById("signup-error");
    errorBox.classList.remove("show");

    let valid = true;
    setFieldError("f-username", username.length < 3); if (username.length < 3) valid = false;
    const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    setFieldError("f-email", !emailOk); if (!emailOk) valid = false;
    setFieldError("f-password", password.length < 6); if (password.length < 6) valid = false;
    setFieldError("f-confirm", confirm !== password || !confirm); if (confirm !== password || !confirm) valid = false;
    if (!valid) return;

    const submitBtn = document.getElementById("signup-submit");
    submitBtn.disabled = true; submitBtn.textContent = "Creating accountâ€¦";

    const res = await AUTH.signup({ username, email, password });

    submitBtn.disabled = false; submitBtn.textContent = "Create Account";

    if (res.ok) {
      toast("Account created! Welcome to AniLoka.", "success");
      setTimeout(() => window.location.href = "home.html", 400);
    } else {
      errorBox.textContent = res.error;
      errorBox.classList.add("show");
    }
  });

  if (DB.getSession()) window.location.href = "home.html";
</script>
</body>
</html>
